<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивное расписание · Школа им. Мустая Карима</title>
    <!-- Подключение шрифтов и иконок -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1>
                <i class="fas fa-calendar-alt"></i> 
                Расписание занятий
            </h1>
            <p class="school-name">МБОУ СОШ им. Мустая Карима · с. Кляшево</p>
        </header>

        <div class="filters-panel">
            <div class="filter-group">
                <label for="class-select"><i class="fas fa-users"></i> Класс</label>
                <select id="class-select" class="filter-select">
                    <option value="all">Все классы</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="teacher-select"><i class="fas fa-chalkboard-teacher"></i> Учитель</label>
                <select id="teacher-select" class="filter-select">
                    <option value="all">Все учителя</option>
                </select>
            </div>
        </div>

        <div id="schedule-container" class="schedule-grid">
            <!-- Карточки уроков будут вставлены сюда через JS -->
        </div>

        <footer class="footer">
            <p>© 2026 · Разработано в рамках производственной практики</p>
        </footer>
    </div>

    <!-- Подключение данных и скриптов -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
